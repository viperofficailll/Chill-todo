services:
  mysql:
    image: mysql:latest
    container_name: todo-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Sandesh@69
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: todo_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pSandesh@69"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    env_file:
    - config.env
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Sandesh@69
      DB_NAME: todo_db
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: